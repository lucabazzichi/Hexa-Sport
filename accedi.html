<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Accedi — Hexa Sport</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Sora:wght@400;600;700&family=Archivo:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script>(function(){document.documentElement.classList.add('js');try{var s=JSON.parse(localStorage.getItem('hs_tweaks')||'{}');var m=s.themeMode||'auto';var light=(m==='light')||(m==='auto'&&window.matchMedia('(prefers-color-scheme:light)').matches);document.documentElement.setAttribute('data-theme',light?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
</head>
<template id="__bundler_thumbnail" data-bg-color="#07090d">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#07090d"/>
    <polygon points="600,250 660,285 660,355 600,390 540,355 540,285" fill="none" stroke="#eda21f" stroke-width="10"/>
    <rect x="572" y="300" width="16" height="44" fill="#eda21f"/>
    <rect x="596" y="288" width="16" height="56" fill="#eda21f"/>
    <rect x="620" y="312" width="16" height="32" fill="#eda21f"/>
    <text x="600" y="470" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="#f3f5f8" text-anchor="middle" letter-spacing="2">HEXA <tspan fill="#eda21f">SPORT</tspan></text>
    <text x="600" y="520" font-family="Arial, sans-serif" font-size="24" fill="#6b7585" text-anchor="middle">Accedi al tuo account</text>
  </svg>
</template>
<body>
<div class="bg-fx"></div>

<header class="nav nav-simple">
  <div class="wrap nav-inner">
    <a class="brand" href="index.html">
      <img src="assets/logo.png" alt="Hexa Sport" />
      <span>HEXA <span class="accent">SPORT</span></span>
    </a>
    <div class="nav-cta">
      <a class="ghost-link" href="index.html">← Torna al sito</a>
    </div>
  </div>
</header>

<main class="login-section">
  <div class="wrap login-wrap">
    <form class="auth-form login-form" id="login" novalidate>
      <span class="eyebrow">Bentornato</span>
      <h1>Accedi al tuo account.</h1>
      <p class="sub">Inserisci le tue credenziali per ritrovare le tue squadre e le tue statistiche.</p>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="mario@squadra.it" autocomplete="email" required />
      </div>

      <div class="field">
        <div class="label-row">
          <label for="password">Password</label>
          <a class="forgot" href="recupero-password.html">Password dimenticata?</a>
        </div>
        <div class="pw-wrap">
          <input type="password" id="password" name="password" placeholder="La tua password" autocomplete="current-password" required />
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="Mostra password">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>

      <label class="check-field remember">
        <input type="checkbox" id="remember" name="remember" checked />
        <span>Ricordami su questo dispositivo</span>
      </label>

      <button type="submit" class="btn btn-primary btn-lg btn-block">Accedi</button>

      <div class="form-msg" id="form-msg">Accesso effettuato! 🎉 Bentornato in Hexa Sport.</div>

      <p class="auth-alt">Non hai ancora un account? <a href="registrazione.html">Registrati gratis</a></p>
    </form>
  </div>
</main>

<script>
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#eda21f",
  "themeMode": "auto",
  "displayFont": "Space Grotesk"
}/*EDITMODE-END*/;
</script>
<script src="tweaks-core.js"></script>
<script src="login.js"></script>
</body>
</html>
