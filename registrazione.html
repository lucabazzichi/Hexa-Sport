<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crea il tuo account — Hexa Sport</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Sora:wght@400;600;700&family=Archivo:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script>(function(){document.documentElement.classList.add('js');try{var s=JSON.parse(localStorage.getItem('hs_tweaks')||'{}');var m=s.themeMode||'auto';var light=(m==='light')||(m==='auto'&&window.matchMedia('(prefers-color-scheme:light)').matches);document.documentElement.setAttribute('data-theme',light?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
<style>
  .bridge-spin{width:30px;height:30px;margin:6px auto 24px;border:3px solid var(--accent-soft);border-top-color:var(--accent);border-radius:50%;animation:bspin .8s linear infinite}
  @keyframes bspin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg-fx"></div>

<header class="nav nav-simple">
  <div class="wrap nav-inner">
    <a class="brand" href="./">
      <img src="assets/logo.png" alt="Hexa Sport" />
      <span>HEXA <span class="accent">SPORT</span></span>
    </a>
    <div class="nav-cta">
      <a class="ghost-link" href="./">← Torna al sito</a>
    </div>
  </div>
</header>

<main class="login-section">
  <div class="login-wrap">
    <div class="auth-form login-form" style="text-align:center;">
      <span class="eyebrow" style="justify-content:center;">Crea il tuo account</span>
      <h1>Sei a un passo dal campo.</h1>
      <p class="sub">Ti portiamo all'app: crei il tuo account in un minuto e aggiungi subito la tua prima squadra.</p>
      <div class="bridge-spin"></div>
      <a class="btn btn-primary btn-lg btn-block" href="app/">Inizia ora →</a>
    </div>
  </div>
</main>

<script>setTimeout(function(){ window.location.replace("app/"); }, 1200);</script>
</body>
</html>
