<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Recupero password — Hexa Sport</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Sora:wght@400;600;700&family=Archivo:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script>(function(){document.documentElement.classList.add('js');try{var s=JSON.parse(localStorage.getItem('hs_tweaks')||'{}');var m=s.themeMode||'auto';var light=(m==='light')||(m==='auto'&&window.matchMedia('(prefers-color-scheme:light)').matches);document.documentElement.setAttribute('data-theme',light?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
</head>
<body>
<div class="bg-fx"></div>

<header class="nav nav-simple">
  <div class="wrap nav-inner">
    <a class="brand" href="index.html">
      <img src="assets/logo.png" alt="Hexa Sport" />
      <span>HEXA <span class="accent">SPORT</span></span>
    </a>
    <div class="nav-cta">
      <a class="ghost-link" href="accedi.html">← Torna all'accesso</a>
    </div>
  </div>
</header>

<main class="login-section">
  <div class="login-wrap">
    <form class="auth-form login-form" id="reset" novalidate>
      <span class="eyebrow">Recupero password</span>
      <h1>Hai dimenticato la password?</h1>
      <p class="sub">Inserisci l'email del tuo account: ti invieremo un link per reimpostarla.</p>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="mario@squadra.it" autocomplete="email" required />
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-block">Invia link di reset</button>

      <div class="form-msg" id="form-msg">Fatto! 📬 Se esiste un account con questa email, riceverai a breve il link per reimpostare la password.</div>

      <p class="auth-alt">Te la sei ricordata? <a href="accedi.html">Torna all'accesso</a></p>
    </form>
  </div>
</main>

<script>
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#eda21f",
  "themeMode": "auto",
  "displayFont": "Sora"
}/*EDITMODE-END*/;
</script>
<script src="tweaks-core.js"></script>
<script>
(function () {
  "use strict";
  document.getElementById("reset").addEventListener("submit", function (e) {
    e.preventDefault();
    var form = e.target;
    if (!form.checkValidity()) { form.reportValidity(); return; }
    document.getElementById("form-msg").classList.add("show");
    form.querySelector('button[type="submit"]').textContent = "Link inviato ✓";
    form.querySelector('button[type="submit"]').disabled = true;
  });
  if (window.HSTweaks) {
    HSTweaks.init({
      defaults: (typeof TWEAK_DEFAULTS !== "undefined") ? TWEAK_DEFAULTS : {},
      controls: ["accent", "themeMode", "displayFont"]
    });
  }
})();
</script>
</body>
</html>
